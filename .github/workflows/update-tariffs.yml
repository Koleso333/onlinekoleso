name: Update Podorozhray tariffs

on:
  schedule:
    - cron: '0 8 * * 1'   # понедельник, 08:00 UTC (11:00 МСК)
  workflow_dispatch:       # ручной запуск из вкладки Actions

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install -r scripts/requirements.txt

      - name: Run tariff updater
        run: python scripts/update_tariffs.py

      - name: Commit and push changes
        run: |
          if [ -n "$(git status --porcelain podorozhray/tariffs.json)" ]; then
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add podorozhray/tariffs.json
            git commit -m "Auto-update tariffs"
            git push
          else
            echo "No changes to commit."
          fi
